name = "bio305-api"
compatibility_date = "2026-06-01"
pages_build_output_dir = "public"

# Cloudflare Pages project (frontend lives on GitHub Pages; this is the API only).
# KV created with `wrangler kv namespace create bio305`.
[[kv_namespaces]]
binding = "BIO305_KV"
id = "3fcc47b82e6847db903398544383542c"

# Secrets (set after first deploy, NOT stored here):
#   wrangler pages secret put APP_SECRET   --project-name bio305-api
#   wrangler pages secret put RELAY_SECRET --project-name bio305-api
